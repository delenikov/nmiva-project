services:
  postgres:
    image: postgres:18-alpine
    container_name: nmiva-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nmiva
      POSTGRES_USER: nmiva
      POSTGRES_PASSWORD: nmiva
    ports:
      - "5432:5432"
    volumes:
      - nmiva_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nmiva -d nmiva"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nmiva_postgres_data:
